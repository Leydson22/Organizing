<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ nome }} - YouTube Local</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=6">
<style>
    .player-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    .main-content {
        display: flex;
        flex: 1;
        overflow: hidden;
        padding: 0;
        background: #000;
    }
    .video-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    video {
        width: 100%;
        height: 100%;
        max-height: 100%;
        object-fit: contain;
    }
    .playlist-section {
        width: 380px;
        background: var(--sidebar-bg);
        border-left: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
    }
    .playlist-header {
        padding: 25px;
        border-bottom: 1px solid var(--border-color);
    }
    .playlist-items {
        flex: 1;
        overflow-y: auto;
    }
    .playlist-item {
        display: flex;
        padding: 15px 25px;
        text-decoration: none;
        color: var(--text-color);
        border-bottom: 1px solid var(--border-color);
        transition: var(--transition);
        align-items: center;
        gap: 15px;
    }
    .playlist-item:hover {
        background: var(--hover-bg);
    }
    .playlist-item.active {
        background: rgba(0, 99, 229, 0.1);
        border-left: 4px solid var(--accent-color);
        padding-left: 21px;
    }
    .playlist-item.active .item-title {
        color: var(--accent-color);
        font-weight: 700;
    }
    .item-number {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 800;
        width: 20px;
    }
    .item-title {
        font-size: 13px;
        line-height: 1.4;
    }
    
    @media (max-width: 991px) {
        .main-content { flex-direction: column; overflow: auto; }
        .playlist-section { width: 100%; border-left: none; border-top: 1px solid var(--border-color); }
        .video-section { aspect-ratio: 16/9; flex: none; }
    }
</style>
</head>
<body>

<div class="player-container">
    <header class="header">
        <div class="logo">
            YOUTUBE<span>LOCAL</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="nav-buttons" style="display: flex; gap: 10px;">
                <a href="/?openCurso={{ nome_curso | urlencode }}" class="btn btn-secondary">
                    <span>📚</span> MÓDULOS
                </a>
                <button onclick="window.history.back()" class="btn btn-secondary">
                    <span>↩️</span> VOLTAR
                </a>
            </div>
            <button onclick="toggleTheme()" class="btn btn-secondary" style="font-size: 18px; padding: 8px 12px;">🌗</button>
        </div>
    </header>

    <main class="main-content">
        <div class="video-section">
            <video id="mainVideo" controls autoplay>
                <source src="/video/{{ filepath | urlencode }}" type="video/mp4">
                Seu navegador não suporta vídeos HTML5.
            </video>
        </div>

        <aside class="playlist-section">
            <div class="playlist-header">
                <h3>CONTEÚDO DO MÓDULO</h3>
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 5px; font-weight: 700;">{{ categoria | upper }}</p>
            </div>
            
            <div class="playlist-items">
                {% for item in playlist %}
                <a href="/player/{{ item.video.filepath | urlencode }}?categoria={{ item.cat | urlencode }}" 
                   class="playlist-item {% if item.video.filepath == filepath %}active{% endif %}">
                    <span class="item-number">{{ "%02d" | format(loop.index) }}</span>
                    <div class="item-title">{{ item.video.nome }}</div>
                </a>
                {% endfor %}
            </div>
        </aside>
    </main>
</div>

<script>
    // Theme sync
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    // Auto-scroll to active item
    window.addEventListener('DOMContentLoaded', () => {
        const activeItem = document.querySelector('.playlist-item.active');
        if (activeItem) {
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    });
</script>

</body>
</html>
