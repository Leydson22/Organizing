<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ nome }} - YouTube Local</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=6">
<style>
    .player-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    .main-content {
        display: flex;
        flex: 1;
        overflow: hidden;
        padding: 0;
        background: #000;
    }
    .video-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    video {
        width: 100%;
        height: 100%;
        max-height: 100%;
        object-fit: contain;
    }
    .playlist-section {
        width: 380px;
        background: var(--sidebar-bg);
        border-left: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
    }
    .playlist-header {
        padding: 25px;
        border-bottom: 1px solid var(--border-color);
    }
    .playlist-items {
        flex: 1;
        overflow-y: auto;
    }
    .playlist-item {
        display: flex;
        padding: 12px 25px;
        text-decoration: none;
        color: var(--text-color);
        border-bottom: 1px solid var(--border-color);
        transition: var(--transition);
        align-items: center;
        gap: 12px;
        font-size: 13px;
    }
    .playlist-item:hover {
        background: var(--hover-bg);
    }
    .playlist-item.active {
        background: rgba(0, 99, 229, 0.1);
        border-left: 4px solid var(--accent-color);
        padding-left: 21px !important;
    }
    .playlist-item.subcat-item {
        padding-left: 45px;
    }
    .playlist-item.subcat-item.active {
        padding-left: 41px !important;
    }
    .playlist-item.active .item-title {
        color: var(--accent-color);
        font-weight: 700;
    }
    .subcat-header {
        padding: 10px 25px;
        color: var(--accent-color);
        font-size: 11px;
        font-weight: 700;
        opacity: 0.8;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.02);
        border-bottom: 1px solid var(--border-color);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .item-title {
        font-size: 13px;
        line-height: 1.4;
    }
    
    @media (max-width: 991px) {
        .main-content { flex-direction: column; overflow: auto; }
        .playlist-section { width: 100%; border-left: none; border-top: 1px solid var(--border-color); }
        .video-section { aspect-ratio: 16/9; flex: none; }
    }
</style>
</head>
<body>

<div class="player-container">
    <header class="header">
        <div class="logo">
            YOUTUBE<span>LOCAL</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="nav-buttons" style="display: flex; gap: 10px;">
                <a href="/?openCurso={{ nome_curso | urlencode }}" class="btn btn-secondary">
                    <span>📚</span> MÓDULOS
                </a>
                <button onclick="window.history.back()" class="btn btn-secondary">
                    <span>↩️</span> VOLTAR
                </a>
            </div>
            <button onclick="toggleTheme()" class="btn btn-secondary" style="font-size: 18px; padding: 8px 12px;">🌗</button>
        </div>
    </header>

    <main class="main-content">
        <div class="video-section">
            <video id="mainVideo" controls autoplay>
                <source src="/video/{{ filepath | urlencode }}" type="video/mp4">
                Seu navegador não suporta vídeos HTML5.
            </video>
        </div>

        <aside class="playlist-section">
            <div class="playlist-header" style="padding: 30px 25px;">
                <span style="font-size: 10px; color: var(--text-muted); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-family: 'Outfit', sans-serif; display: block; opacity: 0.7;">CONTEÚDO DO MÓDULO</span>
                <h3 style="font-size: 20px; color: var(--text-color); font-weight: 800; margin-top: 8px; font-family: 'Outfit', sans-serif; line-height: 1.3;">{{ categoria }}</h3>
                <div style="width: 50px; height: 3px; background: var(--accent-color); border-radius: 2px; margin-top: 15px; box-shadow: 0 0 10px var(--accent-glow);"></div>
            </div>
            
            <div class="playlist-items">
                {% for group in playlist %}
                {% if group.subcategoria %}
                <div class="subcat-header">
                    <span>📁</span> {{ group.subcategoria }}
                </div>
                {% endif %}
                {% for video in group.videos %}
                <a href="/player/{{ video.filepath | urlencode }}?categoria={{ categoria | urlencode }}" 
                   class="playlist-item {% if video.filepath == filepath %}active{% endif %} {% if group.subcategoria %}subcat-item{% endif %}">
                    <span>🎬</span>
                    <div class="item-title">{{ video.nome }}</div>
                </a>
                {% endfor %}
                {% endfor %}
            </div>
        </aside>
    </main>
</div>

<script>
    // Theme sync
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    // Auto-scroll to active item
    window.addEventListener('DOMContentLoaded', () => {
        const activeItem = document.querySelector('.playlist-item.active');
        if (activeItem) {
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    });
</script>

</body>
</html>
